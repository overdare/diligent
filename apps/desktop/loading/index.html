<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diligent</title>
    <style>
      :root {
        --bg: #0f1415;
        --text: #eff7f8;
        --muted: #96afb4;
        --accent: #5ad9b8;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, monospace;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
      }

      .logo {
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .spinner {
        width: 24px;
        height: 24px;
        border: 2px solid transparent;
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .status {
        font-size: 0.75rem;
        color: var(--muted);
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">Diligent</div>
      <div class="spinner"></div>
      <div class="status">Starting server...</div>
    </div>
  </body>
</html>
