name: Build

on:
  push:
    tags: ["release-*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to package (for example: 0.1.0)"
        required: true
        type: string

jobs:
  overdare-ai-agent-sidecar:
    name: OVERDARE CLI sidecar artifact
    runs-on: macos-latest
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Resolve release version
        shell: bash
        run: |
          VERSION="${RELEASE_VERSION#release-}"
          if [ -z "$VERSION" ]; then
            echo "Failed to resolve version from RELEASE_VERSION=$RELEASE_VERSION" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Packaging version: $VERSION"

      - name: Build OVERDARE sidecar
        run: bun run overdare-ai-agent:build-sidecar

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: overdare-ai-agent-sidecar-${{ env.VERSION }}
          path: |
            apps/overdare-ai-agent/.diligent/diagnostics/**
