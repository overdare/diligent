name: Build
on:
  push:
    tags: ["release-*"]
  workflow_dispatch:
    inputs:
      version:
        description: Release version to package (for example: 0.1.0)
        required: true
        type: string

jobs:
  desktop-windows:
    name: Desktop Windows release artifact
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - run: bun install

      - name: Resolve release version
        shell: bash
        run: |
          VERSION="${RELEASE_VERSION#release-}"
          if [ -z "$VERSION" ]; then
            echo "Failed to resolve version from RELEASE_VERSION=$RELEASE_VERSION" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Packaging version: $VERSION"

      - name: Package desktop release
        run: bun run package --version ${{ env.VERSION }} --platforms windows-x64

      - name: Upload Desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: diligent-desktop-windows-x64-${{ env.VERSION }}
          path: |
            dist/windows-x64/**
            dist/checksums.sha256
            dist/release-meta.json
