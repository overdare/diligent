name: tech-lead review

on:
  schedule:
    - cron: '0 21 * * *' # Every day at 06:00 KST (= 21:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if last commit was a tech-lead review
        id: guard
        shell: bash
        run: |
          LAST_MSG=$(git log -1 --format="%s" origin/main)
          echo "Last commit: $LAST_MSG"
          if echo "$LAST_MSG" | grep -q "^chore(repo): tech-lead review"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download latest diligent Linux binary
        if: steps.guard.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_JSON=$(gh api "repos/${{ github.repository }}/releases?per_page=30")
          ASSET_URL=$(python3 - <<'PY' "$RELEASE_JSON"
          import json
          import sys

          releases = json.loads(sys.argv[1])
          for release in releases:
              for asset in release.get("assets", []):
                  name = asset.get("name", "")
                  if name.startswith("diligent-") and name.endswith("-linux-x64"):
                      print(asset["url"])
                      raise SystemExit(0)

          raise SystemExit("No diligent Linux x64 release asset found")
          PY
          )
          mkdir -p .bin
          gh api "$ASSET_URL" -H "Accept: application/octet-stream" > .bin/diligent
          chmod +x .bin/diligent
          ./.bin/diligent --version

      - name: Configure Diligent auth
        if: steps.guard.outputs.skip == 'false'
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.diligent
          cat > ~/.diligent/auth.jsonc <<EOF
          {
            "anthropic": "${ANTHROPIC_API_KEY}"
          }
          EOF
          cat > ~/.diligent/config.jsonc <<'EOF'
          {
            "model": "claude-opus-4-6"
          }
          EOF

      - name: Run tech-lead skill
        if: steps.guard.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          ./.bin/diligent --yolo --prompt "The user invoked /tech-lead. Before any other action, call the skill tool with the skill name \"tech-lead\". Then execute the skill fully in this repository."

      - name: Commit and push
        if: steps.guard.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
            exit 0
          fi

          git commit -m "chore(repo): tech-lead review $(date +%Y-%m-%d)"
          LEFTHOOK=0 git push origin main
