name: tech-lead review

on:
  schedule:
    - cron: '0 21 * * *' # Every day at 06:00 KST (= 21:00 UTC)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip unless 50 commits accumulated since last reviewed commit
        id: guard
        shell: bash
        run: |
          set -euo pipefail

          LAST_REVIEW_FILE=$(git log --diff-filter=A --name-only --pretty=format: -- 'docs/review/[0-9]*.md' | sed '/^$/d' | head -n 1)

          if [ -z "$LAST_REVIEW_FILE" ]; then
            echo "No previous review file found; running tech-lead."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_REVIEW_BASENAME=$(basename "$LAST_REVIEW_FILE")
          LAST_REVIEW_HASH=${LAST_REVIEW_BASENAME%.md}
          LAST_REVIEW_HASH=${LAST_REVIEW_HASH##*-}

          if ! LAST_REVIEW_COMMIT=$(git rev-parse "${LAST_REVIEW_HASH}^{commit}" 2>/dev/null); then
            echo "Could not resolve reviewed commit from $LAST_REVIEW_BASENAME; running tech-lead."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMITS_SINCE=$(git rev-list --count "${LAST_REVIEW_COMMIT}..origin/main")
          echo "Last review file: $LAST_REVIEW_FILE"
          echo "Reviewed commit: $LAST_REVIEW_HASH"
          echo "Commits since last review: $COMMITS_SINCE"

          if [ "$COMMITS_SINCE" -ge 50 ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download latest diligent Linux binary
        if: steps.guard.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .bin
          gh release download \
            --repo "${{ github.repository }}" \
            --pattern 'diligent-*-linux-x64' \
            --dir .bin
          BIN_PATH=$(find .bin -maxdepth 1 -type f -name 'diligent-*-linux-x64' | head -n 1)
          if [ -z "$BIN_PATH" ]; then
            echo "Failed to download diligent latest Linux x64 binary" >&2
            exit 1
          fi
          mv "$BIN_PATH" .bin/diligent
          chmod +x .bin/diligent
          ./.bin/diligent --version

      - name: Configure Diligent auth
        if: steps.guard.outputs.skip == 'false'
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.diligent
          cat > ~/.diligent/auth.jsonc <<EOF
          {
            "anthropic": "${ANTHROPIC_API_KEY}"
          }
          EOF
          cat > ~/.diligent/config.jsonc <<'EOF'
          {
            "model": "claude-opus-4-6"
          }
          EOF

      - name: Run tech-lead skill
        if: steps.guard.outputs.skip == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ./.bin/diligent --yolo --prompt "/tech-lead"

      - name: Commit and push
        if: steps.guard.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
            exit 0
          fi

          git commit -m "chore(repo): tech-lead review $(date +%Y-%m-%d)"
          LEFTHOOK=0 git push origin main
