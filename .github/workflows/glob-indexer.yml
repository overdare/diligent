name: glob-indexer

on:
  schedule:
    - cron: '0 20 * * *'  # Every day at 05:00 KST (= 20:00 UTC)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run glob-indexer skill
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: claude -p "/glob-indexer" --model haiku --dangerously-skip-permissions

      - name: Commit and push
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes — skipping commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: glob-indexer $(date +%Y-%m-%d)"
          LEFTHOOK=0 git push origin main
