name: passion-junior

on:
  schedule:
    - cron: '0 22 * * *' # Run 1 hour after tech-lead review (07:00 KST = 22:00 UTC)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download latest diligent Linux binary
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .bin
          gh release download \
            --repo "${{ github.repository }}" \
            --pattern 'diligent-*-linux-x64' \
            --dir .bin
          BIN_PATH=$(find .bin -maxdepth 1 -type f -name 'diligent-*-linux-x64' | head -n 1)
          if [ -z "$BIN_PATH" ]; then
            echo "Failed to download diligent latest Linux x64 binary" >&2
            exit 1
          fi
          mv "$BIN_PATH" .bin/diligent
          chmod +x .bin/diligent
          ./.bin/diligent --version

      - name: Configure Diligent auth
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.diligent
          cat > ~/.diligent/auth.jsonc <<EOF
          {
            "anthropic": "${ANTHROPIC_API_KEY}"
          }
          EOF
          cat > ~/.diligent/config.jsonc <<'EOF'
          {
            "model": "claude-sonnet-4-6"
          }
          EOF

      - name: Configure git
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Verify gh auth
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh auth status

      - name: Run passion-junior skill
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ./.bin/diligent --yolo --prompt "The user invoked /passion-junior. Before any other action, call the skill tool with the skill name \"passion-junior\". Then execute the skill fully in this repository. You may use the provided GitHub token for PR and branch operations as needed."
