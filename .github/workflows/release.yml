name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      release_exists: ${{ steps.check_release.outputs.release_exists }}

    steps:
      - name: Resolve version
        id: resolve
        shell: bash
        run: |
          RELEASE_VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          VERSION="${RELEASE_VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "Failed to resolve version from RELEASE_VERSION=$RELEASE_VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Packaging version: $VERSION"

      - name: Check existing GitHub Release
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          if gh release view "$TAG" --json id >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists for $TAG. Skipping build/publish jobs."
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
            echo "No release exists for $TAG. Continuing."
          fi

  build-overdare-runtime-bundle:
    name: Build OVERDARE runtime bundle
    needs: prepare
    if: ${{ needs.prepare.outputs.release_exists != 'true' }}
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build runtime bundle
        shell: bash
        run: |
          bun run overdare-cli:build-runtime-bundle -- --version "$VERSION" --platform darwin-arm64

      - name: Upload runtime bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: overdare-runtime-darwin-arm64-${{ env.VERSION }}
          path: |
            dist/overdare-runtime-${{ env.VERSION }}-darwin-arm64.zip

  build-linux-cli-x64:
    name: Diligent Linux x64 CLI
    needs: prepare
    if: ${{ needs.prepare.outputs.release_exists != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build Linux x64 CLI binary
        shell: bash
        run: |
          bun run build:linux-x64
          mv dist/diligent-linux-x64 dist/diligent-${VERSION}-linux-x64

      - name: Upload Linux CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: diligent-linux-x64-${{ env.VERSION }}
          path: dist/diligent-${{ env.VERSION }}-linux-x64

  publish-release:
    name: Publish GitHub Release
    needs: [prepare, build-overdare-runtime-bundle, build-linux-cli-x64]
    if: ${{ needs.prepare.outputs.release_exists != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
      REPOSITORY: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v4

      - name: Download runtime bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: overdare-runtime-darwin-arm64-${{ env.VERSION }}
          path: release-artifacts/runtime-darwin-arm64

      - name: Download Linux x64 CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: diligent-linux-x64-${{ env.VERSION }}
          path: release-artifacts/linux-x64

      - name: Assemble release files
        shell: bash
        run: |
          mkdir -p dist
          cp -R release-artifacts/runtime-darwin-arm64/. dist/
          cp -R release-artifacts/linux-x64/. dist/

      - name: Generate merged metadata
        shell: bash
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          version = os.environ["VERSION"]
          repository = os.environ["REPOSITORY"]
          dist = Path("dist")
          runtime_bundle = dist / f"overdare-runtime-{version}-darwin-arm64.zip"
          linux_cli = dist / f"diligent-{version}-linux-x64"

          def sha256(path: Path) -> str:
              h = hashlib.sha256()
              with path.open("rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          artifacts = {}
          if runtime_bundle.exists():
              artifacts["darwin-arm64-runtime"] = [runtime_bundle.name]
          if linux_cli.exists():
              artifacts["linux-x64"] = [linux_cli.name]

          release_date = datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")
          platforms = {}
          if runtime_bundle.exists():
              platforms["darwin-arm64"] = {
                  "url": f"https://github.com/{repository}/releases/download/v{version}/{runtime_bundle.name}",
                  "sha256": sha256(runtime_bundle),
                  "size": runtime_bundle.stat().st_size,
              }

          manifest = {
              "version": version,
              "releaseDate": release_date,
              "platforms": platforms,
          }
          (dist / "update-manifest.json").write_text(json.dumps(manifest, indent=2) + "\n")

          git_commit = os.popen("git rev-parse --short HEAD").read().strip() or "unknown"
          release_meta = {
              "version": version,
              "buildDate": release_date,
              "gitCommit": git_commit,
              "platforms": list(artifacts.keys()),
              "artifacts": artifacts,
          }
          (dist / "release-meta.json").write_text(json.dumps(release_meta, indent=2) + "\n")

          checksum_files = sorted(
              path for path in dist.iterdir() if path.is_file() and path.name not in {"checksums.sha256", "release-meta.json"}
          )
          checksum_lines = [f"{sha256(path)}  {path.name}" for path in checksum_files]
          (dist / "checksums.sha256").write_text("\n".join(checksum_lines) + "\n")
          PY

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$TAG" \
            dist/overdare-runtime-"$VERSION"-darwin-arm64.zip \
            dist/diligent-"$VERSION"-linux-x64 \
            dist/update-manifest.json \
            dist/release-meta.json \
            dist/checksums.sha256 \
            --title "$TAG" \
            --generate-notes \
            --draft

      - name: Upload merged release metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: overdare-release-metadata-${{ env.VERSION }}
          path: |
            dist/update-manifest.json
            dist/release-meta.json
            dist/checksums.sha256
