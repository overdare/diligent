name: Overdare Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string
      runtime_only:
        description: "Build runtime + version artifacts only (skip desktop exe)"
        required: false
        default: false
        type: boolean

jobs:
  pack-windows:
    name: Overdare Windows package
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - run: bun install

      - name: Resolve version
        shell: bash
        run: |
          VERSION="${RELEASE_VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "Failed to resolve version from RELEASE_VERSION=$RELEASE_VERSION" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Packaging version: $VERSION"

      - name: Check existing GitHub Release
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="v$VERSION"
          if gh release view "$TAG" --json id >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists for $TAG. Skipping package/release steps."
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
            echo "No release exists for $TAG. Continuing."
          fi

      - name: Package
        if: ${{ steps.check_release.outputs.release_exists != 'true' }}
        env:
          DILIGENT_UPDATE_URL: https://github.com/${{ github.repository }}/releases/latest/download/update-manifest.json
          DILIGENT_UPDATE_BASE_URL: https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION }}
        shell: bash
        run: |
          CMD="bun run package --version $VERSION --platforms windows-x64 --package thirdparty/overdare"
          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.runtime_only || false }}" = "true" ]; then
            CMD="$CMD --runtime-only"
          fi
          echo "Running: $CMD"
          eval "$CMD"

      - name: Upload artifacts (full)
        if: ${{ steps.check_release.outputs.release_exists != 'true' && !(github.event_name == 'workflow_dispatch' && inputs.runtime_only) }}
        uses: actions/upload-artifact@v4
        with:
          name: overdare-windows-x64-${{ env.VERSION }}
          path: |
            dist/*-${{ env.VERSION }}-windows-x64.exe
            dist/*-runtime-${{ env.VERSION }}-windows-x64.zip
            dist/update-manifest.json
            dist/release-meta.json
            dist/checksums.sha256

      - name: Upload artifacts (runtime-only)
        if: ${{ steps.check_release.outputs.release_exists != 'true' && github.event_name == 'workflow_dispatch' && inputs.runtime_only }}
        uses: actions/upload-artifact@v4
        with:
          name: overdare-windows-x64-${{ env.VERSION }}
          path: |
            dist/*-runtime-${{ env.VERSION }}-windows-x64.zip
            dist/update-manifest.json
            dist/release-meta.json
            dist/checksums.sha256

      - name: Create GitHub Release
        if: ${{ steps.check_release.outputs.release_exists != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="v$VERSION"
          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.runtime_only || false }}" = "true" ]; then
            gh release create "$TAG" \
              dist/*-runtime-"$VERSION"-windows-x64.zip \
              dist/update-manifest.json \
              dist/checksums.sha256 \
              --title "v$VERSION" \
              --generate-notes \
              --draft
          else
            gh release create "$TAG" \
              dist/*-"$VERSION"-windows-x64.exe \
              dist/*-runtime-"$VERSION"-windows-x64.zip \
              dist/update-manifest.json \
              dist/checksums.sha256 \
              --title "v$VERSION" \
              --generate-notes \
              --draft
          fi

      - name: Skip release creation (already exists)
        if: ${{ steps.check_release.outputs.release_exists == 'true' }}
        shell: bash
        run: echo "Skipped: GitHub Release already exists for v$VERSION"
