name: Overdare Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string
      runtime_only:
        description: "Build runtime + version artifacts only (skip desktop exe)"
        required: false
        default: false
        type: boolean

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      runtime_only: ${{ steps.resolve.outputs.runtime_only }}
      release_exists: ${{ steps.check_release.outputs.release_exists }}

    steps:
      - name: Resolve version
        id: resolve
        shell: bash
        run: |
          RELEASE_VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          VERSION="${RELEASE_VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "Failed to resolve version from RELEASE_VERSION=$RELEASE_VERSION" >&2
            exit 1
          fi

          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.runtime_only || false }}" = "true" ]; then
            RUNTIME_ONLY=true
          else
            RUNTIME_ONLY=false
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "runtime_only=$RUNTIME_ONLY" >> "$GITHUB_OUTPUT"
          echo "Packaging version: $VERSION"
          echo "Runtime-only mode: $RUNTIME_ONLY"

      - name: Check existing GitHub Release
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          if gh release view "$TAG" --json id >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists for $TAG. Skipping build/publish jobs."
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
            echo "No release exists for $TAG. Continuing."
          fi

  pack-windows:
    name: Overdare Windows package
    needs: prepare
    if: ${{ needs.prepare.outputs.release_exists != 'true' }}
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - run: bun install

      - name: Package
        env:
          DILIGENT_UPDATE_URL: https://github.com/${{ github.repository }}/releases/latest/download/update-manifest.json
          DILIGENT_UPDATE_BASE_URL: https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION }}
          PLUGIN_DEFINE_SUPABASE_PUBLIC_KEY: ${{ secrets.SUPABASE_PUBLIC_KEY }}
        shell: bash
        run: |
          CMD="bun run package --version $VERSION --platforms windows-x64"
          if [ "${{ needs.prepare.outputs.runtime_only }}" = "true" ]; then
            CMD="$CMD --runtime-only"
          fi
          echo "Running: $CMD"
          eval "$CMD"

      - name: Upload artifacts (full)
        if: ${{ needs.prepare.outputs.runtime_only != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: overdare-windows-x64-${{ env.VERSION }}
          path: |
            dist/*-${{ env.VERSION }}-windows-x64.exe
            dist/*-runtime-${{ env.VERSION }}-windows-x64.zip

      - name: Upload artifacts (runtime-only)
        if: ${{ needs.prepare.outputs.runtime_only == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: overdare-windows-x64-${{ env.VERSION }}
          path: |
            dist/*-runtime-${{ env.VERSION }}-windows-x64.zip

  pack-macos-arm64:
    name: Overdare macOS arm64 package
    needs: prepare
    if: ${{ needs.prepare.outputs.release_exists != 'true' }}
    runs-on: macos-15
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - run: bun install

      - name: Package
        env:
          DILIGENT_UPDATE_URL: https://github.com/${{ github.repository }}/releases/latest/download/update-manifest.json
          DILIGENT_UPDATE_BASE_URL: https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION }}
          PLUGIN_DEFINE_SUPABASE_PUBLIC_KEY: ${{ secrets.SUPABASE_PUBLIC_KEY }}
        shell: bash
        run: |
          CMD="bun run package --version $VERSION --platforms darwin-arm64"
          if [ "${{ needs.prepare.outputs.runtime_only }}" = "true" ]; then
            CMD="$CMD --runtime-only"
          fi
          echo "Running: $CMD"
          eval "$CMD"

      - name: Upload artifacts (full)
        if: ${{ needs.prepare.outputs.runtime_only != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: overdare-darwin-arm64-${{ env.VERSION }}
          path: |
            dist/*-${{ env.VERSION }}-darwin-arm64
            dist/*-runtime-${{ env.VERSION }}-darwin-arm64.zip

      - name: Upload artifacts (runtime-only)
        if: ${{ needs.prepare.outputs.runtime_only == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: overdare-darwin-arm64-${{ env.VERSION }}
          path: |
            dist/*-runtime-${{ env.VERSION }}-darwin-arm64.zip

  publish-release:
    name: Publish GitHub Release
    needs: [prepare, pack-windows, pack-macos-arm64]
    if: ${{ needs.prepare.outputs.release_exists != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
      RUNTIME_ONLY: ${{ needs.prepare.outputs.runtime_only }}
      RELEASE_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.prepare.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: overdare-windows-x64-${{ env.VERSION }}
          path: release-artifacts/windows-x64

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: overdare-darwin-arm64-${{ env.VERSION }}
          path: release-artifacts/darwin-arm64

      - name: Assemble release files
        shell: bash
        run: |
          mkdir -p dist
          cp -R release-artifacts/windows-x64/. dist/
          cp -R release-artifacts/darwin-arm64/. dist/

      - name: Generate merged metadata
        shell: bash
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          version = os.environ["VERSION"]
          runtime_only = os.environ["RUNTIME_ONLY"] == "true"
          release_base_url = os.environ["RELEASE_BASE_URL"]
          dist = Path("dist")
          files = sorted(path for path in dist.iterdir() if path.is_file())

          runtime_bundles = {}
          artifacts = {
              "windows-x64": [],
              "darwin-arm64": [],
          }

          def sha256(path: Path) -> str:
              h = hashlib.sha256()
              with path.open("rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          for path in files:
              name = path.name
              if name.endswith(f"-runtime-{version}-windows-x64.zip"):
                  artifacts["windows-x64"].append(name)
                  runtime_bundles["windows-x64"] = {
                      "url": f"{release_base_url}/{name}",
                      "sha256": sha256(path),
                      "size": path.stat().st_size,
                  }
              elif name.endswith(f"-runtime-{version}-darwin-arm64.zip"):
                  artifacts["darwin-arm64"].append(name)
                  runtime_bundles["darwin-arm64"] = {
                      "url": f"{release_base_url}/{name}",
                      "sha256": sha256(path),
                      "size": path.stat().st_size,
                  }
              elif not runtime_only and name.endswith(f"-{version}-windows-x64.exe"):
                  artifacts["windows-x64"].append(name)
              elif not runtime_only and name.endswith(f"-{version}-darwin-arm64"):
                  artifacts["darwin-arm64"].append(name)

          release_date = datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")

          manifest = {
              "version": version,
              "releaseDate": release_date,
              "platforms": runtime_bundles,
          }
          (dist / "update-manifest.json").write_text(json.dumps(manifest, indent=2) + "\n")

          git_commit = os.popen("git rev-parse --short HEAD").read().strip() or "unknown"
          release_meta = {
              "version": version,
              "buildDate": release_date,
              "gitCommit": git_commit,
              "platforms": [platform for platform, names in artifacts.items() if names],
              "artifacts": {platform: names for platform, names in artifacts.items() if names},
          }
          (dist / "release-meta.json").write_text(json.dumps(release_meta, indent=2) + "\n")

          checksum_files = sorted(
              path for path in dist.iterdir() if path.is_file() and path.name not in {"checksums.sha256", "release-meta.json"}
          )
          checksum_lines = [f"{sha256(path)}  {path.name}" for path in checksum_files]
          (dist / "checksums.sha256").write_text("\n".join(checksum_lines) + "\n")
          PY

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [ "$RUNTIME_ONLY" = "true" ]; then
            gh release create "$TAG" \
              dist/*-runtime-"$VERSION"-windows-x64.zip \
              dist/*-runtime-"$VERSION"-darwin-arm64.zip \
              dist/update-manifest.json \
              dist/release-meta.json \
              dist/checksums.sha256 \
              --title "$TAG" \
              --generate-notes \
              --draft
          else
            gh release create "$TAG" \
              dist/*-"$VERSION"-windows-x64.exe \
              dist/*-"$VERSION"-darwin-arm64 \
              dist/*-runtime-"$VERSION"-windows-x64.zip \
              dist/*-runtime-"$VERSION"-darwin-arm64.zip \
              dist/update-manifest.json \
              dist/release-meta.json \
              dist/checksums.sha256 \
              --title "$TAG" \
              --generate-notes \
              --draft
          fi

      - name: Upload merged release metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: overdare-release-metadata-${{ env.VERSION }}
          path: |
            dist/update-manifest.json
            dist/release-meta.json
            dist/checksums.sha256
