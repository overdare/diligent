name: Overdare Release

on:
  push:
    tags: ["overdare-*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string

jobs:
  pack-windows:
    name: Overdare Windows package
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - run: bun install

      - name: Resolve version
        shell: bash
        run: |
          VERSION="${RELEASE_VERSION#overdare-}"
          if [ -z "$VERSION" ]; then
            echo "Failed to resolve version from RELEASE_VERSION=$RELEASE_VERSION" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Packaging version: $VERSION"

      - name: Package
        run: bun run package --version ${{ env.VERSION }} --platforms windows-x64 --package thirdparty/overdare

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: overdare-windows-x64-${{ env.VERSION }}
          path: dist/overdare-windows-x64-${{ env.VERSION }}.zip
