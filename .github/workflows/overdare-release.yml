name: Overdare Release

on:
  push:
    tags: ["overdare-*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string

jobs:
  pack-windows:
    name: Overdare Windows package
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - run: bun install

      - name: Resolve version
        shell: bash
        run: |
          VERSION="${RELEASE_VERSION#overdare-}"
          if [ -z "$VERSION" ]; then
            echo "Failed to resolve version from RELEASE_VERSION=$RELEASE_VERSION" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Packaging version: $VERSION"

      - name: Package
        env:
          DILIGENT_UPDATE_URL: https://github.com/${{ github.repository }}/releases/latest/download/update-manifest.json
          DILIGENT_UPDATE_BASE_URL: https://github.com/${{ github.repository }}/releases/download/overdare-${{ env.VERSION }}
        run: bun run package --version ${{ env.VERSION }} --platforms windows-x64 --package thirdparty/overdare

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: overdare-windows-x64-${{ env.VERSION }}
          path: |
            dist/*-${{ env.VERSION }}-windows-x64.zip
            dist/*-runtime-${{ env.VERSION }}-windows-x64.zip
            dist/update-manifest.json
            dist/release-meta.json
            dist/checksums.sha256

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="overdare-$VERSION"
          gh release create "$TAG" \
            dist/*-"$VERSION"-windows-x64.zip \
            dist/*-runtime-"$VERSION"-windows-x64.zip \
            dist/update-manifest.json \
            dist/checksums.sha256 \
            --title "Overdare v$VERSION" \
            --generate-notes \
            --draft
